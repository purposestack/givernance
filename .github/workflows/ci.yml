name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    # ADR-017 (one logical DB per tool): CI today only spins up the app DB
    # (`givernance_test`). When Keycloak-dependent e2e tests land, add a
    # separate `givernance_keycloak_test` database + `keycloak` role here;
    # never reuse `givernance_test`. See docs/15-infra-adr.md § ADR-017.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: givernance
          POSTGRES_PASSWORD: givernance_dev
          POSTGRES_DB: givernance_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U givernance -d givernance_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://givernance:givernance_dev@localhost:5432/givernance_test
      REDIS_URL: redis://localhost:6379
      ADMIN_SECRET: ci-test-admin-secret

    steps:
      - uses: actions/checkout@v4

      # Reads the pnpm version from `packageManager` in package.json.
      # v4 of pnpm/action-setup refuses to run when both `with.version`
      # and `packageManager` are set, so we keep a single source of truth.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Biome lint
        run: pnpm biome check .

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Run database migrations
        run: pnpm db:migrate

      - name: Test
        run: pnpm test

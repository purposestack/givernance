# Name of your application. Used to uniquely configure containers.
service: givernance

# Name of the container image.
image: purposestack/givernance

# Deploy to these servers.
servers:
  web:
    hosts:
      - <%= ENV["STAGING_VPS_IP"] %>
    cmd: pnpm --filter @givernance/web run start
  api:
    hosts:
      - <%= ENV["STAGING_VPS_IP"] %>
    cmd: pnpm --filter @givernance/api run start
    proxy:
      host: api.staging.givernance.org
      healthcheck:
        path: /healthz
  worker:
    hosts:
      - <%= ENV["STAGING_VPS_IP"] %>
    cmd: pnpm --filter @givernance/worker run start

proxy:
  ssl: true
  host: staging.givernance.org
  app_port: 3000
  healthcheck:
    path: /

# Credentials for your image host.
registry:
  server: ghcr.io
  username: <%= ENV["GITHUB_ACTOR"] %>
  password:
    - GITHUB_TOKEN

# Inject ENV variables into containers (secrets come from .env).
# Remember to run `kamal env push` after making changes!
env:
  clear:
    NODE_ENV: production
    PORT: 3000
    APP_URL: https://staging.givernance.org
    NEXT_PUBLIC_APP_URL: https://staging.givernance.org
    NEXT_PUBLIC_API_URL: https://api.staging.givernance.org
    NEXT_PUBLIC_KEYCLOAK_URL: https://auth.staging.givernance.org
    S3_ENDPOINT: http://givernance-minio:9000
    S3_ACCESS_KEY_ID: admin
    KEYCLOAK_URL: https://auth.staging.givernance.org
    KEYCLOAK_INTERNAL_URL: http://givernance-keycloak:8080
  secret:
    - POSTGRES_PASSWORD
    - REDIS_PASSWORD
    - MINIO_ROOT_PASSWORD
    - KEYCLOAK_ADMIN_PASSWORD
    - SESSION_SECRET
    - DATABASE_URL
    - DATABASE_URL_APP
    - REDIS_URL
    - S3_SECRET_ACCESS_KEY
    - KEYCLOAK_ADMIN_CLIENT_SECRET

# Configure builder setup.
builder:
  arch: amd64
  dockerfile: Dockerfile

# Use accessories for external services
accessories:
  postgres:
    image: postgres:16
    host: <%= ENV["STAGING_VPS_IP"] %>
    port: 5432
    env:
      clear:
        POSTGRES_USER: givernance
        POSTGRES_DB: givernance_staging
      secret:
        - POSTGRES_PASSWORD
    directories:
      - data/postgres:/var/lib/postgresql/data
  redis:
    image: redis:7
    host: <%= ENV["STAGING_VPS_IP"] %>
    port: 6379
    directories:
      - data/redis:/data
  minio:
    image: minio/minio:latest
    host: <%= ENV["STAGING_VPS_IP"] %>
    port: 9000
    env:
      clear:
        MINIO_ROOT_USER: admin
      secret:
        - MINIO_ROOT_PASSWORD
    directories:
      - data/minio:/data
    cmd: server /data --console-address ":9001"
  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    host: <%= ENV["STAGING_VPS_IP"] %>
    proxy:
      host: auth.staging.givernance.org
      ssl: true
      app_port: 8080
      healthcheck:
        path: /realms/master/.well-known/openid-configuration
    env:
      clear:
        KC_DB: postgres
        KC_DB_URL: jdbc:postgresql://givernance-postgres:5432/givernance_staging
        KC_DB_USERNAME: givernance
        KEYCLOAK_ADMIN: admin
        KC_HOSTNAME: auth.staging.givernance.org
        KC_PROXY_HEADERS: xforwarded
        KC_HOSTNAME_STRICT: "false"
        KC_HTTP_ENABLED: "true"
        KC_HEALTH_ENABLED: "true"
      secret:
        - KC_DB_PASSWORD
        - KEYCLOAK_ADMIN_PASSWORD
    files:
      - infra/keycloak/realm-givernance.json:/opt/keycloak/data/import/realm.json
    cmd: start-dev --import-realm

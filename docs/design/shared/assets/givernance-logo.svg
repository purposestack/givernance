<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <title>Givernance</title>
  <desc>Givernance — G letterform with leaf, forest green</desc>
  <rect width="200" height="200" fill="#ffffff"/>

  <!--
    G arc: circle cx=96 cy=104 r=60, stroke-width=17
    Circumference = 2π×60 ≈ 376.99
    Show 290° → 376.99×290/360 ≈ 303.8px
    Gap  70°  → 376.99×70/360  ≈ 73.2px
    Gap centred at 3-o'clock (right side).
    To start drawing at +35° (just below right), after the gap:
    stroke-dashoffset = -(35/360 × 376.99) = -36.6
    → draw from 35° CW for 290° → ends at 325° (just above right)
    → gap from 325° back around to 35° = right side ✓
  -->
  <circle
    cx="96" cy="104" r="60"
    fill="none"
    stroke="#2E7D5E"
    stroke-width="17"
    stroke-linecap="round"
    stroke-dasharray="303.8 73.2"
    stroke-dashoffset="-36.6"
  />

  <!-- Crossbar — horizontal bar inward from the right opening, centred at cy=104 -->
  <line
    x1="156" y1="104"
    x2="118" y2="104"
    stroke="#2E7D5E"
    stroke-width="17"
    stroke-linecap="round"
  />

  <!-- Leaf — at upper-right of gap (~340° on circle), tip pointing NE -->
  <!--  Base point: cx + r×cos(-20°) , cy + r×sin(-20°)  ≈ (152, 84) -->
  <path
    d="M 152,86  C 157,70 170,58 185,54  C 187,67 179,82 165,88  C 159,91 153,90 152,86 Z"
    fill="#4CAF82"
  />

  <!-- Leaf midrib vein (white slit) -->
  <path
    d="M 155,84  Q 165,71 178,60"
    fill="none"
    stroke="#ffffff"
    stroke-width="2"
    stroke-linecap="round"
    opacity="0.85"
  />

</svg>

<!DOCTYPE html>
<html>
<head>
<style>
  body { margin: 0; background: #f0f0f0; display: flex; align-items: center; justify-content: center; height: 100vh; }
  .card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.12); display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .name { font-family: Georgia, serif; font-size: 28px; color: #1A5240; letter-spacing: 2px; }
</style>
</head>
<body>
<div class="card">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" width="200" height="200">
    <title>Givernance</title>
    <rect width="220" height="220" fill="#FFFFFF"/>

    <!-- G ring body -->
    <path d="
      M 151.42,46.69
      A 78,78 0 1,1 168.07,141.52
      C 168.07,141.52 158.00,148.00 152.80,138.50
      A 59,59 0 1,0 139.20,61.30
      C 143.00,57.00 148.00,50.00 151.42,46.69
      Z
    " fill="#2E7D5E"/>

    <!-- crossbar horizontal fill -->
    <path d="
      M 163.00,126.00
      L 183.00,126.00
      L 183.00,108.00
      L 163.00,108.00
      Z
    " fill="#2E7D5E"/>

    <!-- inner spiral curl from crossbar -->
    <path d="
      M 152.80,138.50
      C 158.00,150.00 153.00,164.00 141.00,168.00
      C 129.00,172.00 117.00,163.00 117.00,151.00
      C 117.00,139.00 127.00,132.00 137.00,135.00
      C 144.00,137.00 146.00,145.00 141.00,149.00
    " fill="none" stroke="#2E7D5E" stroke-width="10" stroke-linecap="round"/>

    <!-- Leaf at aperture (2 o'clock, 45°) -->
    <path d="
      M 168.07,141.52
      C 174.00,128.00 186.00,117.00 199.00,113.00
      C 208.00,110.00 214.00,113.00 213.00,120.00
      C 212.00,127.00 204.00,136.00 193.00,142.00
      C 182.00,148.00 170.00,149.00 165.00,144.00
      Z
    " fill="#4CAF82"/>

    <!-- Leaf vein -->
    <path d="
      M 172.00,141.00
      Q 186.00,127.00 199.00,118.00
    " fill="none" stroke="#FFFFFF" stroke-width="2.2" stroke-linecap="round" opacity="0.85"/>
  </svg>
  <div class="name">GIVERNANCE</div>
</div>
</body>
</html>

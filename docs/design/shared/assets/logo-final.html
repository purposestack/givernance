<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Givernance — Logo Final</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #096447;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
    gap: 40px;
  }
  .hero {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }
  .hero img {
    width: 120px;
    height: 120px;
    object-fit: contain;
    filter: drop-shadow(0 4px 24px rgba(0,0,0,0.3));
  }
  .hero-name {
    font-size: 42px;
    font-weight: 200;
    letter-spacing: 8px;
    text-transform: uppercase;
    color: #ffffff;
  }
  .hero-sub {
    font-size: 13px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
  }
  .variants-row {
    display: flex;
    gap: 16px;
    align-items: center;
  }
  .v {
    width: 64px;
    height: 64px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px;
  }
  .v img { width: 100%; height: 100%; object-fit: contain; }
  .v-light { background: #eee7de; }
  .v-white { background: #ffffff; }
  .v-dark  { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); }
  .footer {
    font-size: 11px;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.2);
    text-transform: uppercase;
  }
</style>
</head>
<body>

  <div class="hero">
    <img src="logo-pheonix-blanc.png" alt="Givernance Phoenix">
    <div class="hero-name">Givernance</div>
    <div class="hero-sub">NPO Management Platform</div>
  </div>

  <div class="variants-row">
    <div class="v v-light"><img src="logo-pheonix-vert.png" alt="vert"></div>
    <div class="v v-white"><img src="logo-pheonix-noir.png" alt="noir"></div>
    <div class="v v-dark" ><img src="logo-pheonix-blanc.png" alt="blanc"></div>
  </div>

  <div class="footer">Phoenix · Résilience · Transformation · 2026</div>

</body>
</html>

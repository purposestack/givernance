<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Givernance — Logo Card</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f5f0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: #ffffff;
    border-radius: 24px;
    box-shadow: 0 8px 40px rgba(9,100,71,0.12), 0 2px 8px rgba(0,0,0,0.06);
    padding: 48px 56px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    min-width: 320px;
  }
  .logo-wrap {
    width: 96px;
    height: 96px;
    background: rgba(9,100,71,0.06);
    border-radius: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px;
  }
  .logo-wrap img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
  .brand-name {
    font-size: 28px;
    font-weight: 300;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #096447;
  }
  .divider {
    width: 40px;
    height: 2px;
    background: #096447;
    opacity: 0.3;
    border-radius: 2px;
  }
  .tagline {
    font-size: 13px;
    color: #888;
    letter-spacing: 0.5px;
    text-align: center;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap">
      <img src="logo-pheonix-vert.png" alt="Givernance Phoenix">
    </div>
    <div class="brand-name">Givernance</div>
    <div class="divider"></div>
    <div class="tagline">NPO Management Platform</div>
  </div>
</body>
</html>

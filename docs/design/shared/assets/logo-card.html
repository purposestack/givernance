<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Givernance — Phoenix Logo</title>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    background: #0f1117;
    color: #e4e4e7;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
  }
  .title {
    font-family: 'Newsreader', Georgia, serif;
    font-size: 32px;
    font-weight: 500;
    letter-spacing: 0.02em;
    color: #ffffff;
    margin-bottom: 8px;
  }
  .subtitle {
    font-size: 14px;
    color: #71717a;
    letter-spacing: 0.04em;
    margin-bottom: 56px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 200px);
    gap: 32px;
    margin-bottom: 56px;
  }
  .card {
    border-radius: 20px;
    padding: 40px 32px 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    transition: transform 150ms ease;
  }
  .card:hover { transform: translateY(-4px); }
  .card img { width: 72px; height: 72px; object-fit: contain; }
  .card-label {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.02em;
  }
  .card-usage {
    font-size: 11px;
    opacity: 0.6;
    text-align: center;
    line-height: 1.5;
  }
  .card-dark {
    background: #096447;
    color: #ffffff;
  }
  .card-light {
    background: #f0faf5;
    border: 1px solid rgba(9, 100, 71, 0.12);
    color: #1a5240;
  }
  .card-white {
    background: #ffffff;
    border: 1px solid #e4e4e7;
    color: #27272a;
  }
  .footer {
    font-size: 12px;
    color: #52525b;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  @media (max-width: 700px) {
    .grid { grid-template-columns: 1fr; max-width: 240px; }
  }
</style>
</head>
<body>
  <h1 class="title">Givernance — Phoenix Logo</h1>
  <p class="subtitle">Brand identity — three variants for all contexts</p>
  <div class="grid">
    <div class="card card-dark">
      <img src="logo-pheonix-blanc.png" alt="Phoenix Blanc">
      <div class="card-label">Blanc</div>
      <div class="card-usage">Fonds sombres<br>Sidebar, hero sections</div>
    </div>
    <div class="card card-light">
      <img src="logo-pheonix-vert.png" alt="Phoenix Vert">
      <div class="card-label">Vert</div>
      <div class="card-usage">Fonds clairs<br>Usage principal</div>
    </div>
    <div class="card card-white">
      <img src="logo-pheonix-noir.png" alt="Phoenix Noir">
      <div class="card-label">Noir</div>
      <div class="card-usage">Fonds blancs<br>Documents, print</div>
    </div>
  </div>
  <p class="footer">Givernance NPO Platform · Mars 2026</p>
</body>
</html>

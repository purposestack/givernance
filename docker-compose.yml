version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: givernance_postgres
    environment:
      POSTGRES_DB: givernance
      POSTGRES_USER: givernance
      POSTGRES_PASSWORD: givernance
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U givernance"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: givernance_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes

  minio:
    image: minio/minio
    container_name: givernance_minio
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"

  mailpit:
    image: axllent/mailpit
    container_name: givernance_mailpit
    ports:
      - "8025:8025" # Web UI
      - "1025:1025" # SMTP port

volumes:
  pgdata:
  redisdata:
  miniodata:
